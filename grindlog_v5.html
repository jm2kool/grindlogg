<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrindLog"/>
<meta name="theme-color" content="#000"/>
<title>GrindLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#6ee7b7; --gd:#34d399; --bg:#000; --s1:#0d0d0d; --s2:#161616; --b1:#1e1e1e; --b2:#2a2a2a;
  --t1:#ffffff; --t2:#aaaaaa; --t3:#555555; --t4:#2e2e2e;
  --red:#f87171; --amber:#fbbf24; --xp:#a78bfa; --xpd:#7c3aed;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:var(--bg);color:var(--t2);font-family:'DM Mono',monospace;overscroll-behavior:none;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}

.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.logo em{color:var(--g);font-style:normal}
.hdr-right{display:flex;align-items:center;gap:6px}
.streak-n{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--g);line-height:1}
.streak-info{display:flex;flex-direction:column;gap:1px}
.streak-lbl{font-size:8px;color:var(--t3);letter-spacing:1px}
.streak-fire{font-size:13px}

.xp-icon{font-size:12px}
.xp-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--xp)}
.xp-lbl{font-size:8px;color:#7c5fba;letter-spacing:.5px}

/* level bar */
.level-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.level-badge{background:linear-gradient(135deg,var(--xp),var(--xpd));color:#fff;font-family:'Syne',sans-serif;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap}
.level-bar-wrap{flex:1;height:3px;background:var(--b1);border-radius:2px}
.level-bar-fill{height:100%;background:linear-gradient(90deg,var(--xp),#c084fc);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.level-xp-txt{font-size:8px;color:#7c5fba;white-space:nowrap}

.wk-progress{display:flex;align-items:center;gap:8px}
.wk-lbl{font-size:9px;color:var(--t3);letter-spacing:.5px;white-space:nowrap}
.wk-bar-wrap{flex:1;height:3px;background:var(--b1);border-radius:2px}
.wk-bar-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--gd));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.wk-val{font-size:9px;color:var(--g);letter-spacing:.5px;white-space:nowrap;font-family:'Syne',sans-serif;font-weight:700}

/* ── NAV TABS — Liquid Glass ── */
.tabs{
  display:flex;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  margin:8px 12px 4px;
  padding:4px;
  flex-shrink:0;
  gap:2px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);
}
.tab{
  flex:1;padding:10px 0 8px;font-size:9px;letter-spacing:1px;font-family:'DM Mono',monospace;
  background:none;border:none;color:var(--t3);cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);border-radius:14px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tab-icon{font-size:16px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.tab.on{
  background:rgba(110,231,183,0.12);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:var(--g);
  box-shadow:0 1px 8px rgba(110,231,183,0.15),inset 0 1px 0 rgba(110,231,183,0.2);
  border:1px solid rgba(110,231,183,0.2);
}
.tab.on .tab-icon{transform:scale(1.15)}

/* ── LIQUID GLASS GLOBALS ── */
.hdr{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(30px) saturate(160%);
  -webkit-backdrop-filter:blur(30px) saturate(160%);
  padding-top:calc(var(--st) + 8px);padding-left:16px;padding-right:16px;padding-bottom:10px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  box-shadow:0 1px 0 rgba(255,255,255,0.04);
}
.day-card{
  display:flex;flex-direction:column;gap:0;padding:14px 16px;margin-bottom:6px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r);cursor:pointer;
  transition:background .12s,border-color .12s,box-shadow .12s;
  -webkit-user-select:none;user-select:none;
  box-shadow:0 2px 12px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05);
}
.day-card:active{background:rgba(255,255,255,0.06)}
.day-card.today{
  background:rgba(110,231,183,0.05);
  border-color:rgba(110,231,183,0.2);
  box-shadow:0 0 20px rgba(110,231,183,0.06),inset 0 1px 0 rgba(110,231,183,0.1);
}
.day-card.is-rest{opacity:.35;cursor:default;pointer-events:none}
.day-card.is-rest-swap{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.05)}
.card{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r);padding:16px;margin-bottom:8px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.total-card{
  background:rgba(110,231,183,0.04);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(110,231,183,0.15);
  border-radius:var(--r);padding:16px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 0 16px rgba(110,231,183,0.04);
}
.sheet{
  background:rgba(16,16,18,0.85);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,255,255,0.1);
  border-top:1px solid rgba(255,255,255,0.14);
  border-radius:22px 22px 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;padding:0 0 calc(var(--sb) + 8px);
  box-shadow:0 -4px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
}
.xp-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(26,15,46,0.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(167,139,250,0.25);
  padding:5px 10px;border-radius:20px;
  box-shadow:0 2px 8px rgba(124,58,237,0.15),inset 0 1px 0 rgba(167,139,250,0.1);
}
.streak-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  padding:5px 10px;border-radius:20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
}
.sc{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r);padding:18px 14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.shop-item{
  display:flex;align-items:center;gap:14px;padding:16px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r);margin-bottom:8px;transition:all .15s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.shop-item:active{background:rgba(255,255,255,0.06)}
.walk-toggle{
  display:flex;align-items:center;gap:14px;padding:16px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r);cursor:pointer;margin-bottom:8px;transition:all .15s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.walk-toggle.on{
  background:rgba(110,231,183,0.05);
  border-color:rgba(110,231,183,0.2);
  box-shadow:0 0 16px rgba(110,231,183,0.05),inset 0 1px 0 rgba(110,231,183,0.1);
}
.tip{
  background:rgba(110,231,183,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(110,231,183,0.12);border-radius:var(--r);padding:16px;margin-top:12px;
}
.wc{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.07);border-radius:var(--r);padding:16px;margin-bottom:10px;
}

/* ── APPLE WATCH RINGS ── */
.watch-rings-wrap{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);border-radius:18px;
  padding:20px 16px 16px;margin-bottom:16px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
}
.watch-rings-inner{display:flex;align-items:center;justify-content:center;gap:20px}
.ring-svg-wrap{position:relative;flex-shrink:0}
.ring-center-inputs{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;text-align:center;}
.ring-labels{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0}
.ring-label-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.ring-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ring-label-text{display:flex;flex-direction:column}
.ring-label-name{font-size:9px;letter-spacing:1px;color:var(--t3)}
.ring-label-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;line-height:1.1}
.ring-label-unit{font-size:9px;color:var(--t3)}
.wm-input{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  background:transparent;border:none;outline:none;width:54px;text-align:center;
  -moz-appearance:textfield;
}
.wm-input::-webkit-inner-spin-button,.wm-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.wm-input.move-inp{color:#ff375f}
.wm-input.exercise-inp{color:#92f442}
.wm-input.stand-inp{color:#1ac8ff}
.ring-input-unit{font-size:8px;color:var(--t3);letter-spacing:.5px}

/* ── SCROLL AREA ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px calc(var(--sb) + 24px);min-height:0}

/* ── WEEK VIEW ── */
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.wk-nav-lbl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t2);letter-spacing:.5px}
.wk-nav-date{font-size:9px;color:var(--t3);margin-top:1px;letter-spacing:.3px}
.nav-arr{background:none;border:1px solid var(--b1);color:var(--t3);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.nav-arr:active{background:var(--s2);color:var(--t2)}
.nav-arr.dim{color:var(--b2);border-color:var(--b1);cursor:default}

.day-card-top{display:flex;align-items:center;gap:14px}
.day-em{font-size:24px;width:32px;text-align:center;flex-shrink:0}
.day-body{flex:1;min-width:0}
.day-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.day-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t2)}
.day-card.today .day-name{color:var(--g)}
.pill{font-size:8px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.8px}
.pill-today{background:var(--g);color:#000}
.pill-rest{background:var(--b2);color:var(--t3)}
.pill-done{background:#071510;color:var(--g);border:1px solid #1a3828}
.day-sub{font-size:11px;color:var(--t3)}
.day-kcal{font-size:10px;color:#2d7a52;margin-top:2px}
.mini-prog{width:100%;height:2px;background:var(--b1);border-radius:2px;margin-top:8px;overflow:hidden}
.mini-prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g),var(--gd));transition:width .3s}
.day-right{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--t3);flex-shrink:0}
.day-right.g{color:var(--g)}

/* ── EFFORT BARS (triangle style) ── */
.effort-bars-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}
.effort-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.effort-lbl{font-size:9px;color:var(--t3);letter-spacing:1px}
.effort-val-lbl{font-size:10px;font-weight:700;font-family:'Syne',sans-serif}
.effort-bars{display:flex;align-items:flex-end;gap:4px;height:44px;touch-action:none;cursor:pointer}
.effort-bar{flex:1;border-radius:6px 6px 4px 4px;transition:background .15s,height .15s;position:relative;min-height:8px}
.effort-bar.active{box-shadow:0 0 8px rgba(255,255,255,.2)}

/* effort color states */
.effort-c1{background:linear-gradient(180deg,#22c55e,#16a34a)}
.effort-c2{background:linear-gradient(180deg,#22c55e,#84cc16)}
.effort-c3{background:linear-gradient(180deg,#84cc16,#eab308)}
.effort-c4{background:linear-gradient(180deg,#eab308,#f97316)}
.effort-c5{background:linear-gradient(180deg,#f97316,#ef4444)}

/* ── LOG VIEW ── */
.day-scroller{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;scrollbar-width:none}
.day-scroller::-webkit-scrollbar{display:none}
.dtab{padding:9px 16px;border-radius:10px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.8px;background:var(--s1);color:var(--t3);border:1px solid var(--b1);white-space:nowrap;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
.dtab.on{background:var(--g);color:#000;font-weight:700;border-color:var(--g)}
.dtab.done{color:var(--g);border-color:#1a3828;background:#071510}
.dtab.tod{border-color:#1a3828}

.log-title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}
.log-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--t1);line-height:1.1}
.log-complete-badge{background:#071510;border:1px solid #1a3828;color:var(--g);font-size:9px;padding:5px 10px;border-radius:8px;letter-spacing:1px;white-space:nowrap;margin-top:4px}

.sec{font-size:9px;color:var(--t3);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ── START WORKOUT BUTTON ── */
.start-workout-btn{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--g),var(--gd));color:#000;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;border:none;cursor:pointer;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s;-webkit-user-select:none;user-select:none}
.start-workout-btn:active{opacity:.85}
.start-workout-btn .sw-icon{font-size:18px}

/* ── EXERCISES ── */
.ex-list{margin-bottom:8px}
.ex-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;margin-bottom:4px;cursor:pointer;transition:background .1s;position:relative}
.ex-item:active{background:rgba(255,255,255,.03)}
.chk{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--b2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.on{background:var(--g);border-color:var(--g)}
.chk.on::after{content:'✓';font-size:13px;font-weight:700;color:#000}
.ex-label{flex:1;min-width:0}
.ex-nm{font-size:15px;color:var(--t2);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-nm.done{color:var(--t4);text-decoration:line-through}
.ex-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.ex-sets-lbl{font-size:10px;color:var(--t3)}
.po-tag{font-size:9px;color:var(--g);background:#071510;border:1px solid #1a3828;padding:1px 6px;border-radius:4px;letter-spacing:.5px}
.ex-btn{background:none;border:1px solid var(--b1);color:var(--t3);font-size:9px;padding:4px 9px;border-radius:7px;font-family:'DM Mono',monospace;cursor:pointer;flex-shrink:0;letter-spacing:.5px;transition:all .12s}
.ex-btn:active{background:var(--s2)}

.prog-track{height:2px;background:var(--b1);border-radius:2px;margin:-4px 0 16px}
.prog-track-fill{height:100%;background:var(--g);border-radius:2px;transition:width .3s}

.add-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;color:var(--t3);font-size:12px;letter-spacing:.5px;border:1px dashed var(--b2);margin-bottom:16px;transition:all .12s}
.add-row:active{background:var(--s1)}
.add-row-icon{width:22px;height:22px;border-radius:6px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3)}

/* ── WALK TOGGLE ── */
.walk-icon{font-size:26px;flex-shrink:0}
.walk-text{flex:1}
.walk-title{font-size:14px;color:var(--t2);transition:color .15s}
.walk-toggle.on .walk-title{color:var(--g)}
.walk-hint{font-size:10px;color:var(--t3);margin-top:2px}
.walk-toggle.on .walk-hint{color:#2d7a52}
.walk-check{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.walk-toggle.on .walk-check{background:var(--g);border-color:var(--g)}
.walk-toggle.on .walk-check::after{content:'✓';font-size:14px;font-weight:700;color:#000}

.total-lbl{font-size:9px;color:#2d7a52;letter-spacing:1.5px}
.card-row{display:flex;align-items:center;gap:12px}
.card-lbl{font-size:10px;color:var(--t3);letter-spacing:.8px;flex:1}
.card-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--g);text-align:right;background:transparent;border:none;outline:none;width:80px}
.card-unit{font-size:11px;color:var(--t3)}
.total-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--g)}
.total-unit{font-size:11px;color:#2d7a52;margin-left:3px}
.n-input{width:100%;font-size:13px;color:var(--t2);line-height:1.8;background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;resize:none}
.w-input{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--g);background:transparent;border:none;outline:none;width:100px;text-align:right}

/* ── REST DAY BTN ── */
.rest-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;cursor:pointer;border:1px solid var(--b1);background:transparent;color:var(--t3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;width:100%;margin-bottom:16px;transition:all .15s}
.rest-btn:active{background:var(--s1)}
.rest-btn.active-rest{border-color:#3a1515;background:#120505;color:var(--red)}
.rest-btn-icon{font-size:16px}

/* ── REST SCREEN ── */
.rest-screen{text-align:center;padding:60px 20px 30px}
.rest-em{font-size:56px;margin-bottom:12px}
.rest-ttl{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--t3)}

.shop-h{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t1);margin-bottom:4px}

.shop-owned-name{font-size:12px;color:var(--g);font-family:'Syne',sans-serif;font-weight:700}

.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

.f-label{font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-bottom:6px;display:block}

.set-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.set-r{display:flex;align-items:center;gap:10px}
.set-r-lbl{font-size:10px;color:var(--t3);width:50px;flex-shrink:0}
.set-r-in{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--g);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;padding:9px 10px;border-radius:8px;outline:none;text-align:center;transition:border-color .12s}
.set-r-in:focus{border-color:var(--g)}
.po-in{border-color:#1a3828;color:var(--g)}
.po-in:focus{border-color:var(--g)}

.scope{display:flex;background:var(--s2);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:18px}
.scope-opt{flex:1;padding:10px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.5px;cursor:pointer;background:transparent;color:var(--t3);border:none;transition:all .12s}

.sb{width:100%;padding:15px;border-radius:12px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;cursor:pointer;border:none;margin-bottom:8px;transition:opacity .15s;font-weight:700}
.sb.prim{background:var(--g);color:#000}
.sb.prim:active{opacity:.8}
.sb.sec{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.sb.sec:active{opacity:.7}
.sb.del{background:#120505;color:var(--red);border:1px solid #3a1515}

.day-pick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.dpick{padding:12px 8px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-align:center;transition:all .12s}

.dpick.off{opacity:.25;pointer-events:none}

.po-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;margin-bottom:14px;transition:all .12s}
.po-toggle.on{border-color:#1a3828;background:#061510}
.po-toggle-lbl{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:8px}

.po-switch::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:7px;background:#fff;transition:transform .15s}
.po-toggle.on .po-switch::after{transform:translateX(14px)}

/* ═══════════════════════════

═══════════════════════════ */
#workoutOverlay{

}

/* exercise card in active mode */
.wo-ex-card{background:var(--s1);border:1px solid var(--b1);border-radius:18px;margin-bottom:12px;overflow:hidden;transition:all .3s}

.wo-ex-top{display:flex;align-items:center;gap:12px;padding:16px 16px 12px}
.wo-ex-num{width:28px;height:28px;border-radius:8px;background:var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Syne',sans-serif;font-weight:800;color:var(--t3);flex-shrink:0}

/* sets inside active card */
.wo-sets{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}

.wo-set-row.done-set{opacity:.5}
.wo-set-lbl{font-size:10px;color:var(--t3);width:40px;flex-shrink:0;letter-spacing:.5px}
.wo-set-row.active-set .wo-set-lbl{color:var(--g)}
.wo-set-target{font-size:11px;color:var(--t3);flex:1}

/* rep input in set */
.wo-rep-input{width:56px;background:var(--s1);border:1px solid var(--b2);color:var(--t1);font-family:'Syne',sans-serif;font-size:16px;font-weight:700;padding:6px 8px;border-radius:8px;outline:none;text-align:center;transition:border-color .12s}
.wo-rep-input:focus{border-color:var(--g)}
.wo-set-row.active-set .wo-rep-input{border-color:var(--gd)}

/* set timer */
.wo-set-timer{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;min-width:36px;text-align:center}

.wo-set-timer.done{color:var(--g)}

/* set check/done button */
.wo-set-done-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;font-size:14px;color:var(--t3)}
.wo-set-done-btn.done{background:var(--g);border-color:var(--g);color:#000}
.wo-set-done-btn:active{opacity:.7}

/* rest timer banner */
.rest-banner{background:#0d1a0a;border:1px solid #1a4025;border-radius:14px;padding:14px 16px;margin:4px 16px 12px;display:flex;align-items:center;gap:12px}
.rest-timer-circle{width:44px;height:44px;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
.rest-timer-circle svg{position:absolute;inset:0;transform:rotate(-90deg)}
.rest-timer-num{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--g);z-index:1}
.rest-info{flex:1}
.rest-title{font-size:12px;color:var(--g);font-family:'Syne',sans-serif;font-weight:700}
.rest-sub-lbl{font-size:10px;color:#2d7a52;margin-top:2px}
.rest-skip-btn{background:#1a4025;border:1px solid #2d7a52;color:var(--g);font-size:10px;padding:8px 12px;border-radius:8px;font-family:'DM Mono',monospace;cursor:pointer;letter-spacing:.5px;white-space:nowrap}

/* ═══════════════════════════
   WORKOUT COMPLETE OVERLAY
═══════════════════════════ */
#completeOverlay{
  position:fixed;inset:0;background:#000;z-index:400;

}

.co-elephant{font-size:72px;margin-bottom:8px;animation:bounce 0.6s ease infinite alternate}

.co-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--t1);margin-bottom:6px}
.co-sub{font-size:13px;color:var(--t3);margin-bottom:32px}

.co-stats{display:flex;gap:12px;margin-bottom:36px;width:100%}

.co-stat-lbl{font-size:9px;letter-spacing:.8px}
.co-stat.duration{border-color:#7c3aed;background:#1a0f2e}

.co-stat.xp{border-color:#0ea5e9;background:#0c1a26}

.co-stat.volume{border-color:#dc2626;background:#1f0a0a}

/* XP burst animation */
.xp-burst{position:fixed;pointer-events:none;z-index:500;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--xp);animation:xpFloat 1s ease forwards}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

.co-continue-btn{width:100%;padding:18px;border-radius:14px;background:linear-gradient(135deg,var(--g),var(--gd));color:#000;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;border:none;cursor:pointer;letter-spacing:.5px;margin-bottom:12px}
.co-continue-btn:active{opacity:.85}

/* ═══════════════════════════
   ACHIEVEMENT TOAST
═══════════════════════════ */
.achievement-toast{
  position:fixed;top:calc(var(--st) + 16px);left:50%;transform:translateX(-50%) translateY(-120px);
  background:linear-gradient(135deg,#1a0f2e,#2d1a50);

}

.achievement-icon{font-size:24px}
.achievement-info{display:flex;flex-direction:column;gap:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
var DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

var BASE_PLANS={
  Mon:{type:"workout",label:"Push",emoji:"💪"},
  Tue:{type:"walk",  label:"Walk",emoji:"🚶"},
  Wed:{type:"workout",label:"Pull",emoji:"💪"},
  Thu:{type:"walk",  label:"Walk",emoji:"🚶"},
  Fri:{type:"workout",label:"Legs+Core",emoji:"💪"},
  Sat:{type:"walk",  label:"Walk",emoji:"🚶"},

/* ─ Swap ─ */
function isRestSwapped(day){var s=getStore();if(!s.d)return false;var wid=weekId(weekOff);for(var k in s.d){if(k.endsWith("-data"))continue;if(k.indexOf(wid+"-")===0&&s.d[k]===day)return true;}return false;}
function setSwap(fromDay,toDay){var wid=weekId(weekOff),k=wid+"-"+fromDay;if(toDay===null){delete data[k];delete data[k+"-data"];}else{data[k]=toDay;}save();}
function getPlan(day){
  var s=getStore(),wid=weekId(weekOff);
  if(s.d&&s.d[wid+"-"+day]){
    var td=s.d[wid+"-"+day];
    if(typeof td==="string")return{type:"rest_walk",label:"Rest",emoji:"🛌"};
  }
  if(s.d){for(var k in s.d){if(k.endsWith("-data"))continue;if(k.indexOf(wid+"-")===0){var fd=k.replace(wid+"-","");if(s.d[k]===day)return Object.assign({},BASE_PLANS[fd],{swappedFrom:fd});}}}
  return BASE_PLANS[day];
}

/* ─ Utils ─ */
function clone(x){return JSON.parse(JSON.stringify(x));}
function esc(s){return s.replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function todayName(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];}
function ordinal(n){var s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function weekId(off){off=off||0;var d=new Date();d.setDate(d.getDate()+off*7);var j=new Date(d.getFullYear(),0,1);var w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return d.getFullYear()+"-W"+w;}
function weekDates(off){var now=new Date(),day=now.getDay();var diff=day===0?-6:1-day;var mon=new Date(now);mon.setDate(now.getDate()+diff+(off||0)*7);var out=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);out.push(d);}return out;}
function fmtRange(off){var ds=weekDates(off),a=ds[0],b=ds[6];return ordinal(a.getDate())+" "+MONTHS[a.getMonth()]+" – "+ordinal(b.getDate())+" "+MONTHS[b.getMonth()];}
function dk(day,off){return weekId(off===undefined?weekOff:off)+"-"+day;}
function logKey(day,off){return dk(day,off===undefined?weekOff:off)+"-data";}
function dd(day,off){var k=dk(day,off===undefined?weekOff:off);var v=data[k];if(typeof v==="string"){return data[k+"-data"]||{};}return v||{};}
function patch(day,obj,off){var k=dk(day,off===undefined?weekOff:off);if(typeof data[k]==="string"){data[k+"-data"]=Object.assign({},data[k+"-data"],obj);}else{data[k]=Object.assign({},data[k],obj);}save();}
function fmtSecs(s){var m=Math.floor(s/60);var sec=s%60;return m+"m"+String(sec).padStart(2,"0")+"s";}
function fmtTimer(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

/* ─ Progress / Completion ─ */
function dayProgress(day,off){
  var p=getPlan(day),d=dd(day,off===undefined?weekOff:off);
  if(p.type==="rest")return 100;
  if(p.type==="rest_walk"||p.type==="walk")return d.walk1?100:0;
  var exs=getExercises(p.label,weekId(off===undefined?weekOff:off));
  if(!exs.length)return 0;
  var done=exs.filter(function(e){return(d.exercises||{})[e.name];}).length;
  return Math.round(done/exs.length*100);
}
function dayDone(day,off){
  var p=getPlan(day),d=dd(day,off===undefined?weekOff:off);
  if(p.type==="rest")return true;
  if(p.type==="rest_walk"||p.type==="walk")return!!d.walk1;
  var exs=getExercises(p.label,weekId(off===undefined?weekOff:off));
  var done=exs.filter(function(e){return(d.exercises||{})[e.name];}).length;
  return exs.length>0&&(done/exs.length*100)>=40&&!!d.walk1;
}
function totalKcal(day,off){var d=dd(day,off);return(parseFloat(d.exKcal)||0)+(parseFloat(d.walkKcal)||0);}
function calcStreak(){
  var s=0,d=new Date();
  for(var i=0;i<90;i++){
    if(i>0)d.setDate(d.getDate()-1);
    var n=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    var bp=BASE_PLANS[n];
    if(bp&&bp.type==="rest"){if(i>0)s++;continue;}
    var j=new Date(d.getFullYear(),0,1);
    var w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
    var wid2=d.getFullYear()+"-W"+w;
    var k=wid2+"-"+n;
    var d2=data[k]||{};
    var ok=false;
    if(bp.type==="walk")ok=!!d2.walk1;
    else{var exs2=getExercises(bp.label,wid2),ce=d2.exercises||{};var dn=exs2.filter(function(x){return ce[x.name];}).length;ok=exs2.length>0&&(dn/exs2.length*100)>=40&&!!d2.walk1;}
    if(ok)s++;else if(i>0)break;
  }
  return s;
}

function calcLevel(xp){
  for(var i=LEVEL_THRESHOLDS.length-1;i>=0;i--){if(xp>=LEVEL_THRESHOLDS[i])return i+1;}return 1;
}
function xpForLevel(lvl){return LEVEL_THRESHOLDS[Math.min(lvl-1,LEVEL_THRESHOLDS.length-1)]||0;}
function xpForNextLevel(lvl){return LEVEL_THRESHOLDS[Math.min(lvl,LEVEL_THRESHOLDS.length-1)]||LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length-1];}
function levelProgress(xp){
  var lvl=calcLevel(xp);
  var cur=xpForLevel(lvl),nxt=xpForNextLevel(lvl);
  if(nxt===cur)return 100;
  return Math.round((xp-cur)/(nxt-cur)*100);
}

function addXP(amount,label,x,y){
  var prev=gameData.xp||0;
  // Apply 2x multiplier if active (only on positive gains from workout/walk)
  var multiplied=amount;
  if(amount>0&&(label==="set"||label==="walk")&&gameData.doubleXpActive){
    multiplied=amount*2;
  }
  gameData.xp=Math.max(0,(prev+multiplied));
  var newLvl=calcLevel(gameData.xp);
  var oldLvl=calcLevel(prev);
  save();
  // burst
  var burst=document.createElement("div");
  burst.className="xp-burst";
  var sign=multiplied>=0?"+":"";
  burst.textContent=sign+multiplied+(gameData.doubleXpActive&&amount>0&&(label==="set"||label==="walk")?" 2×":"")+" XP";
  if(multiplied<0){burst.style.color="#f87171";}
  else if(gameData.doubleXpActive&&(label==="set"||label==="walk")){burst.style.color="#fbbf24";}
  burst.style.left=(x||window.innerWidth/2)+"px";
  burst.style.top=(y||100)+"px";
  document.body.appendChild(burst);
  setTimeout(function(){burst.remove();},1100);
  if(newLvl>oldLvl){
    showAchievement("🎉","LEVEL UP!","You reached Level "+newLvl+"!");
  }
  updateHeader();
}

function effortColor(val){
  if(val<=2)return{label:"Easy",color:"#22c55e",cls:"effort-c1"};
  if(val<=4)return{label:"Light",color:"#84cc16",cls:"effort-c2"};
  if(val<=6)return{label:"Moderate",color:"#eab308",cls:"effort-c3"};
  if(val<=8)return{label:"Hard",color:"#f97316",cls:"effort-c4"};
  return{label:"All Out",color:"#ef4444",cls:"effort-c5"};
}

// Heights for each of 10 bars (ascending triangle shape)
var BAR_HEIGHTS=[12,16,20,24,28,32,36,40,44,48];

function renderEffortSlider(day,containerId){
  var val=getEffort(day)||0;
  var c=effortColor(val||1);
  var el=document.getElementById(containerId);
  if(!el)return;
  
  var barsHtml='<div class="effort-bars" id="effortBars_'+day+'">';
  for(var i=1;i<=10;i++){
    var h=BAR_HEIGHTS[i-1];
    var isActive=i<=val;
    var col=isActive?effortColor(i).color:"var(--b2)";
    barsHtml+='<div class="effort-bar'+(isActive?" active":"")+'" data-v="'+i+'" style="height:'+h+'px;background:'+col+'"></div>';
  }
  barsHtml+='</div>';
  
  el.innerHTML=
    '<div class="effort-top">'
      +'<span class="effort-lbl">EFFORT / LOAD</span>'
      +'<span class="effort-val-lbl" id="effortValLbl_'+day+'" style="color:'+(val>0?c.color:"var(--t3)")+'">'
        +(val===0?"—":val+" · "+c.label)
      +'</span>'
    +'</div>'
    +barsHtml;
  
  bindEffortBars(day);
}

function bindEffortBars(day){
  var bars=document.getElementById("effortBars_"+day);
  if(!bars)return;
  
  function updateBars(val){
    bars.querySelectorAll(".effort-bar").forEach(function(bar,idx){
      var bv=idx+1;
      var isActive=bv<=val;
      bar.style.background=isActive?effortColor(bv).color:"var(--b2)";
      bar.classList.toggle("active",isActive);
    });
    var lbl=document.getElementById("effortValLbl_"+day);
    if(lbl){
      var c=effortColor(val||1);
      lbl.style.color=val>0?c.color:"var(--t3)";
      lbl.textContent=val===0?"—":val+" · "+c.label;
    }
    saveEffort(day,val);
  }
  
  function getValFromTouch(e){
    var rect=bars.getBoundingClientRect();
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var pct=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));
    return Math.round(pct*10);
  }
  
  var dragging=false;
  bars.addEventListener("touchstart",function(e){dragging=true;updateBars(getValFromTouch(e));e.preventDefault();},{passive:false});
  bars.addEventListener("mousedown",function(e){dragging=true;updateBars(getValFromTouch(e));});
  document.addEventListener("touchmove",function(e){if(!dragging)return;updateBars(getValFromTouch(e));e.preventDefault();},{passive:false});
  document.addEventListener("mousemove",function(e){if(!dragging)return;updateBars(getValFromTouch(e));});
  document.addEventListener("touchend",function(){dragging=false;});
  document.addEventListener("mouseup",function(){dragging=false;});
  
  // tap on individual bars
  bars.querySelectorAll(".effort-bar").forEach(function(bar){
    bar.addEventListener("click",function(){updateBars(parseInt(bar.dataset.v));});
  });
}

  function gx(ii){return pL+ii*xS;}
  function gy(v){return pT+gH-(v/100)*gH;}
  var aPts=weeks.map(function(w,ii){return gx(ii)+","+gy(w.pct);}).join(" ");

  else{
    var vals=weights.map(function(k){return parseFloat(data[k].weight);});
    var mn=Math.min.apply(null,vals)-1,mx=Math.max.apply(null,vals)+1,CH=100;
    function px2(ii){return ii*50+25;}function py2(v){return CH-((v-mn)/(mx-mn))*(CH-24)-12;}
    var pts2=vals.map(function(v,ii){return px2(ii)+","+py2(v);}).join(" ");

  var tip=document.createElement("div");

  h+='<div class="tip"><div class="tip-h">💡 TIP OF THE DAY</div><div class="tip-b">'+tips[new Date().getDay()%tips.length]+'</div></div>';
  return h;
}

/* ═══════════════════════════════════════════
   ACTIVE WORKOUT ENGINE
═══════════════════════════════════════════ */
function startWorkout(){
  var p=getPlan(activeDay);
  var exs=getExercises(p.label);
  if(!exs.length)return;

  // init state
  wo.active=true;
  wo.day=activeDay;
  wo.exs=exs;
  wo.startTime=Date.now();
  wo.currentExIdx=0;
  wo.currentSetIdx=0;
  wo.doneSets={};
  wo.repsDone={};
  wo.setTimers={};
  wo.setTimerIntervals={};
  wo.restRemaining=0;
  wo.volume=0;

  // show overlay
  document.getElementById("workoutOverlay").classList.add("active");
  document.getElementById("woTitle").textContent=p.emoji+" "+p.label;

  // global stopwatch
  wo.globalTimerInterval=setInterval(function(){
    var elapsed=Math.floor((Date.now()-wo.startTime)/1000);
    document.getElementById("woGlobalTimer").textContent=fmtTimer(elapsed);
  },1000);

  renderWorkoutBody();
}

function renderWorkoutBody(){
  var exs=wo.exs;
  var totalSets=exs.reduce(function(acc,e){return acc+e.sets;},0);
  var doneCount=Object.keys(wo.doneSets).filter(function(k){return wo.doneSets[k];}).length;
  var progPct=totalSets>0?Math.round(doneCount/totalSets*100):0;
  document.getElementById("woProg").style.width=progPct+"%";

  var html="";
  exs.forEach(function(ex,ei){
    var allSetsDone=true;
    for(var si=0;si<ex.sets;si++){if(!wo.doneSets[ei+"-"+si])allSetsDone=false;}
    var isActiveEx=ei===wo.currentExIdx&&!allSetsDone;
    var cls="wo-ex-card"+(allSetsDone?" done-ex":isActiveEx?" active-ex":"");
    html+='<div class="'+cls+'" id="woCard_'+ei+'">'
      +'<div class="wo-ex-top">'
      +'<div class="wo-ex-num">'+(allSetsDone?"✓":(ei+1))+'</div>'
      +'<div class="wo-ex-name">'+ex.name+'</div>'
      +'<div class="wo-ex-status">'+(allSetsDone?"Done ✓":isActiveEx?"Active…":ex.sets+"×"+ex.reps.join("/"))+'</div>'
      +'</div>';

    if(isActiveEx||allSetsDone){
      html+='<div class="wo-sets">';
      for(var si2=0;si2<ex.sets;si2++){
        var setKey=ei+"-"+si2;
        var isDoneSet=wo.doneSets[setKey];
        var isActiveSet=ei===wo.currentExIdx&&si2===wo.currentSetIdx&&!isDoneSet;
        var targetReps=ex.reps[si2]||ex.reps[0]||12;

        // check if this is a PO exercise
        var po=getPO(wo.day,ex.name);
        var isPO=po.length>0&&po.some(function(v){return v>0;});

        var setCls="wo-set-row"+(isActiveSet?" active-set":isDoneSet?" done-set":"");
        var timerVal=wo.setTimers[setKey]||0;
        var timerTxt=timerVal>0?fmtTimer(timerVal):"—";

        html+='<div class="'+setCls+'" id="woSet_'+setKey+'">'
          +'<div class="wo-set-lbl">SET '+(si2+1)+'</div>'
          +'<div class="wo-set-target">×'+targetReps+(isPO?' <span style="font-size:9px;color:var(--g)">[PO]</span>':"")+'</div>'
          +'<span class="wo-set-timer'+(isActiveSet?" running":isDoneSet?" done":"")+'">'+timerTxt+'</span>';

        // Rep input for PO exercises
        if(isPO||(isActiveSet)){
          var repsVal=wo.repsDone[setKey]!==undefined?wo.repsDone[setKey]:targetReps;
          html+='<input class="wo-rep-input" type="number" inputmode="numeric" id="woRep_'+setKey+'" value="'+repsVal+'" min="0" max="99" placeholder="'+targetReps+'"/>';
        }

        html+='<button class="wo-set-done-btn'+(isDoneSet?" done":"")+'\" data-setkey="'+setKey+'">'+(isDoneSet?"✓":"→")+'</button>';
        html+='</div>';
      }
      html+='</div>';
    }

    // Rest banner after set done (between sets)
    if(ei===wo.currentExIdx&&wo.restRemaining>0){
      var radius=16,circ=2*Math.PI*radius;
      var dashOffset=circ*(1-wo.restRemaining/wo.restTotalFor);
      html+='<div class="rest-banner" id="restBanner">'
        +'<div class="rest-timer-circle">'
        +'<svg width="44" height="44" viewBox="0 0 44 44">'
        +'<circle cx="22" cy="22" r="'+radius+'" fill="none" stroke="#1a4025" stroke-width="3"/>'
        +'<circle cx="22" cy="22" r="'+radius+'" fill="none" stroke="var(--g)" stroke-width="3" stroke-dasharray="'+circ+'" stroke-dashoffset="'+dashOffset+'" stroke-linecap="round"/>'
        +'</svg>'
        +'<div class="rest-timer-num">'+wo.restRemaining+'</div>'
        +'</div>'
        +'<div class="rest-info"><div class="rest-title">Rest Time</div><div class="rest-sub-lbl">Next: '+(wo.currentSetIdx<ex.sets?ex.name+" Set "+(wo.currentSetIdx+1):"Next exercise")+'</div></div>'
        +'<button class="rest-skip-btn" id="restSkipBtn">SKIP</button>'
        +'</div>';
    }

    html+='</div>';
  });

  document.getElementById("woExList").innerHTML=html;
  bindWorkoutBody();
}

function bindWorkoutBody(){
  // Set done buttons
  document.querySelectorAll("[data-setkey]").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var setKey=btn.dataset.setkey;
      if(wo.doneSets[setKey])return;
      var parts=setKey.split("-");
      var ei=parseInt(parts[0]),si=parseInt(parts[1]);
      var ex=wo.exs[ei];

      // capture reps
      var repEl=document.getElementById("woRep_"+setKey);
      var reps=repEl?parseInt(repEl.value)||ex.reps[si]||12:ex.reps[si]||12;
      wo.repsDone[setKey]=reps;

      // stop set timer if running
      if(wo.setTimerIntervals[setKey]){clearInterval(wo.setTimerIntervals[setKey]);delete wo.setTimerIntervals[setKey];}

      // award XP proportional to reps (shown live during workout)
      var rect=btn.getBoundingClientRect();
      addXP(reps,"set",rect.left+rect.width/2,rect.top);

      // volume tracking
      wo.volume+=reps;

      // mark done
      wo.doneSets[setKey]=true;

      // advance cursor
      var nextSi=si+1;
      if(nextSi<ex.sets){
        wo.currentExIdx=ei;
        wo.currentSetIdx=nextSi;
        // start set timer for next set
        startSetTimer(ei,nextSi);
        // start rest
        startRest(ex.reps[nextSi]||12,ex.name+" Set "+(nextSi+1));
      } else {
        // exercise done — advance to next
        wo.currentExIdx=ei+1;
        wo.currentSetIdx=0;
        var nextExIdx=ei+1;
        if(nextExIdx<wo.exs.length){
          startSetTimer(nextExIdx,0);
          startRest(wo.exs[nextExIdx].reps[0]||12,wo.exs[nextExIdx].name+" Set 1");
        } else {
          // all done!
          wo.restRemaining=0;
          finishWorkout();
          return;
        }
        // mark exercise done in data
        var cExs=Object.assign({},dd(wo.day).exercises||{});
        cExs[ex.name]=true;
        patch(wo.day,{exercises:cExs});
      }
      renderWorkoutBody();
    });
  });

  // Skip rest
  var skipBtn=document.getElementById("restSkipBtn");
  if(skipBtn)skipBtn.addEventListener("click",function(){
    if(wo.restTimerInterval){clearInterval(wo.restTimerInterval);wo.restTimerInterval=null;}
    wo.restRemaining=0;
    renderWorkoutBody();
  });

  // Rep inputs
  document.querySelectorAll(".wo-rep-input").forEach(function(inp){
    inp.addEventListener("change",function(){
      var setKey=inp.id.replace("woRep_","");
      wo.repsDone[setKey]=parseInt(inp.value)||0;
    });
  });
}

function startSetTimer(ei,si){
  var setKey=ei+"-"+si;
  wo.setTimers[setKey]=0;
  if(wo.setTimerIntervals[setKey])clearInterval(wo.setTimerIntervals[setKey]);
  wo.setTimerIntervals[setKey]=setInterval(function(){
    wo.setTimers[setKey]=(wo.setTimers[setKey]||0)+1;
    var el=document.querySelector("#woSet_"+setKey+" .wo-set-timer");
    if(el)el.textContent=fmtTimer(wo.setTimers[setKey]);
  },1000);
}

function startRest(targetReps,nextLabel){
  if(wo.restTimerInterval)clearInterval(wo.restTimerInterval);
  wo.restRemaining=60;
  wo.restTotalFor=60;
  renderWorkoutBody();
  wo.restTimerInterval=setInterval(function(){
    wo.restRemaining--;
    // Update rest banner
    var numEl=document.querySelector("#restBanner .rest-timer-num");
    if(numEl)numEl.textContent=wo.restRemaining;
    // update svg circle
    var svgCircles=document.querySelectorAll("#restBanner circle");
    if(svgCircles[1]){
      var radius=16,circ=2*Math.PI*radius;
      var dashOffset=circ*(1-wo.restRemaining/wo.restTotalFor);
      svgCircles[1].setAttribute("stroke-dashoffset",dashOffset);
    }
    if(wo.restRemaining<=0){
      clearInterval(wo.restTimerInterval);
      wo.restTimerInterval=null;
      wo.restRemaining=0;
      // vibrate if supported
      if(navigator.vibrate)navigator.vibrate([100,50,100]);
      renderWorkoutBody();
    }
  },1000);
}

function endWorkout(){
  if(!confirm("End workout? Progress will be saved."))return;
  finishWorkout();
}

function finishWorkout(){
  // stop all timers
  clearInterval(wo.globalTimerInterval);
  if(wo.restTimerInterval)clearInterval(wo.restTimerInterval);
  Object.keys(wo.setTimerIntervals).forEach(function(k){clearInterval(wo.setTimerIntervals[k]);});
  
  var duration=Math.floor((Date.now()-wo.startTime)/1000);

  // save PO reps for PO exercises
  wo.exs.forEach(function(ex,ei){
    var po=getPO(wo.day,ex.name);
    var isPO=po.length>0&&po.some(function(v){return v>0;});
    if(isPO){
      var repsArr=[];
      for(var si=0;si<ex.sets;si++){
        var v=wo.repsDone[ei+"-"+si];
        repsArr.push(v!==undefined?v:(ex.reps[si]||12));
      }
      savePO(wo.day,ex.name,repsArr);
    }
    // mark as done in log
    var cExs=Object.assign({},dd(wo.day).exercises||{});
    var allDone=true;
    for(var si2=0;si2<ex.sets;si2++){if(!wo.doneSets[ei+"-"+si2])allDone=false;}
    if(allDone){cExs[ex.name]=true;patch(wo.day,{exercises:cExs});}
  });

  // XP — already awarded live per set (1 XP per rep). Just track total for display.
  var xpEarned=0;
  wo.exs.forEach(function(ex,ei){
    for(var si=0;si<ex.sets;si++){
      if(wo.doneSets[ei+"-"+si]){
        var reps=wo.repsDone[ei+"-"+si]||ex.reps[si]||12;
        xpEarned+=reps;
      }
    }
  });
  if(xpEarned===0)xpEarned=10;
  gameData.totalWorkouts=(gameData.totalWorkouts||0)+1;
  // Clear 2x multiplier after workout (it covered this session)
  if(gameData.doubleXpActive){gameData.doubleXpActive=false;showAchievement("⚡","2× DONE!","Multiplier used — back to normal XP");}
  save(); // don't call addXP again - already awarded per set

  // save duration
  patch(wo.day,{woDuration:duration,woVolume:wo.volume});

  // show complete overlay
  document.getElementById("workoutOverlay").classList.remove("active");
  document.getElementById("completeOverlay").classList.add("active");
  document.getElementById("coDuration").textContent=fmtSecs(duration);
  document.getElementById("coXP").textContent=xpEarned;
  document.getElementById("coVol").textContent=wo.volume+" reps";
  document.getElementById("coSub").textContent="Crushed it 💪";

  checkAchievements();
  wo.active=false;
}

function bind(){
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click",function(){
      if(t.dataset.v==="log"){
        // Always jump to today's actual day
        weekOff=0;
        activeDay=todayName();
      }
      view=t.dataset.v;render();
    });
  });

  if(view==="week"){
    var wPrev=document.getElementById("wPrev"),wNext=document.getElementById("wNext");
    if(wPrev)wPrev.addEventListener("click",function(){weekOff--;render();});
    if(wNext)wNext.addEventListener("click",function(){if(weekOff<0){weekOff++;render();}});
    document.querySelectorAll(".day-card:not(.is-rest)").forEach(function(card){
      card.addEventListener("click",function(e){
        activeDay=card.dataset.day;view="log";render();
      });
    });
  }

  if(view==="shop"){
    // Permanent rewards
    document.querySelectorAll("[data-permidx]").forEach(function(btn){
      btn.addEventListener("click",function(){
        var idx=parseInt(btn.dataset.permidx);
        var item=PERMANENT_SHOP_ITEMS[idx];
        if(!item)return;
        var xp=gameData.xp||0;
        var owned=gameData.ownedItems||{};
        var isOwned=owned[item.id]&&owned[item.id].count>0;
        if(isOwned){
          owned[item.id].count--;
          if(owned[item.id].count<=0)delete owned[item.id];
          gameData.ownedItems=owned;
          // activate the power
          if(item.id==="free_skip_day"){gameData.freeSkipActive=true;}
          if(item.id==="double_xp"){gameData.doubleXpActive=true;}
          showAchievement(item.emoji,"ACTIVATED!",item.name+" is now active 🔥");
          save();render();return;
        }
        if(xp<item.cost)return;
        gameData.xp=xp-item.cost;
        if(!gameData.ownedItems)gameData.ownedItems={};
        if(!gameData.ownedItems[item.id])gameData.ownedItems[item.id]={count:0};
        gameData.ownedItems[item.id].count++;
        if(!gameData.shopHistory)gameData.shopHistory=[];
        var now=new Date();
        gameData.shopHistory.push({id:item.id,emoji:item.emoji,name:item.name,
          date:now.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][now.getMonth()]});
        showAchievement(item.emoji,"PURCHASED!",item.name+" added to your stash");
        save();updateHeader();render();
      });
    });

    document.querySelectorAll("[data-shopidx]").forEach(function(btn){
      btn.addEventListener("click",function(){
        var idx=parseInt(btn.dataset.shopidx);
        var items=getShopItems();
        var item=items[idx];
        if(!item)return;
        var xp=gameData.xp||0;
        var owned=gameData.ownedItems||{};
        var isOwned=owned[item.id]&&owned[item.id].count>0;
        if(isOwned){
          owned[item.id].count--;
          if(owned[item.id].count<=0)delete owned[item.id];
          gameData.ownedItems=owned;
          showAchievement(item.emoji,"REDEEMED!",item.name+" used — enjoy! 🎉");
          save();render();return;
        }
        if(xp<item.cost)return;
        gameData.xp=xp-item.cost;
        if(!gameData.ownedItems)gameData.ownedItems={};
        if(!gameData.ownedItems[item.id])gameData.ownedItems[item.id]={count:0};
        gameData.ownedItems[item.id].count++;
        if(!gameData.shopHistory)gameData.shopHistory=[];
        var now=new Date();
        gameData.shopHistory.push({id:item.id,emoji:item.emoji,name:item.name,
          date:now.getDate()+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][now.getMonth()]});
        showAchievement(item.emoji,"PURCHASED!",item.name+" added to your stash");
        save();updateHeader();render();
      });
    });
    var shopAddBtn=document.getElementById("shopAddBtn");
    if(shopAddBtn)shopAddBtn.addEventListener("click",openAddShopItemSheet);

    // Emoji -> trash -> confirm delete
    var delTimers={};
    var trashState={}; // idx -> true if trash showing
    var items_snap=getShopItems();
    items_snap.forEach(function(item,idx){
      var face=document.getElementById("emface_"+idx);
      var trash=document.getElementById("emtrash_"+idx);
      if(!face||!trash)return;

      function showTrash(){
        face.style.opacity="0";
        face.style.pointerEvents="none";
        trash.style.opacity="1";
        trash.style.pointerEvents="auto";
        trashState[idx]=true;
        if(delTimers[idx])clearTimeout(delTimers[idx]);
        delTimers[idx]=setTimeout(function(){hideTrash();},5000);
      }

      function hideTrash(){
        face.style.opacity="1";
        face.style.pointerEvents="auto";
        trash.style.opacity="0";
        trash.style.pointerEvents="none";
        trashState[idx]=false;
        if(delTimers[idx]){clearTimeout(delTimers[idx]);delTimers[idx]=null;}
      }

      face.addEventListener("click",function(e){
        e.stopPropagation();
        showTrash();
      });

      trash.addEventListener("click",function(e){
        e.stopPropagation();
        if(delTimers[idx]){clearTimeout(delTimers[idx]);delTimers[idx]=null;}
        // Show built-in confirm popup
        showDeleteConfirm(item.name, function(){
          var current=getShopItems();
          current.splice(idx,1);
          var s=getStoreFull();
          localStorage.setItem("gl3",JSON.stringify({d:data,g:gameData,shopItems:current,ringGoalsTemp:s.ringGoalsTemp,ringGoalsPerm:s.ringGoalsPerm}));
          render();
        }, function(){
          hideTrash();
        });
      });
    });
  }

  if(view==="log"){
    document.querySelectorAll("[data-ld]").forEach(function(btn){
      btn.addEventListener("click",function(){activeDay=btn.dataset.ld;render();});
    });

    // start workout
    var swBtn=document.getElementById("startWorkoutBtn");
    if(swBtn)swBtn.addEventListener("click",startWorkout);

    document.querySelectorAll(".ex-item").forEach(function(row){
      row.addEventListener("click",function(e){
        if(e.target.closest(".ex-btn"))return;
        var ex=row.dataset.ex,d=dd(activeDay),cExs=Object.assign({},d.exercises||{});
        cExs[ex]=!cExs[ex];patch(activeDay,{exercises:cExs});render();
      });
    });
    document.querySelectorAll(".ex-btn[data-exedit]").forEach(function(btn){
      btn.addEventListener("click",function(e){e.stopPropagation();openEditSheet(btn.dataset.exedit);});
    });
    var addRow=document.getElementById("addExBtn");
    if(addRow)addRow.addEventListener("click",openAddSheet);
    var restBtn=document.getElementById("restDayBtn");
    if(restBtn)restBtn.addEventListener("click",openRestSheet);
    var undoBtn=document.getElementById("undoRestBtn");
    if(undoBtn)undoBtn.addEventListener("click",function(){
      var wid=weekId(weekOff);
      Object.keys(data).forEach(function(k){
        if(k.indexOf(wid+"-")===0&&!k.endsWith("-data")){
          var fd=k.replace(wid+"-","");
          if(fd===activeDay||(typeof data[k]==="string"&&data[k]===activeDay)){
            setSwap(fd,null);
          }
        }
      });
      render();
    });
    var walkBtn=document.getElementById("walkBtn");
    if(walkBtn)walkBtn.addEventListener("click",function(){
      var wasDone=dd(activeDay).walk1;
      patch(activeDay,{walk1:!wasDone});
      if(!wasDone){
        // Award 10% of walk kcal as XP
        var walkKcal=parseFloat(dd(activeDay).walkKcal)||0;
        var walkXP=walkKcal>0?Math.round(walkKcal*XP_WALK_PER_KCAL_PCT):30;
        addXP(walkXP,"walk",window.innerWidth/2,200);
        patch(activeDay,{walkXpAwarded:walkXP});
        // Clear 2x multiplier after walk (if still active after workout used it, walk consumes it)
        if(gameData.doubleXpActive){gameData.doubleXpActive=false;save();showAchievement("⚡","2× DONE!","Walk boosted! Multiplier now used up");}
        checkAchievements();
      } else {
        // Deselecting: remove previously awarded walk XP
        var prevXP=dd(activeDay).walkXpAwarded||0;
        if(prevXP>0){addXP(-prevXP,"walk_deduct",window.innerWidth/2,200);}
        patch(activeDay,{walkXpAwarded:0});
      }
      render();
    });
    function updateTotal(){
      var ex=parseFloat((document.getElementById("exKcalIn")||{value:0}).value)||0;
      var wk=parseFloat((document.getElementById("walkKcalIn")||{value:0}).value)||0;
      var disp=document.getElementById("totalKcalDisp");
      if(disp)disp.textContent=ex+wk;
    }
    var exKI=document.getElementById("exKcalIn");
    if(exKI){exKI.addEventListener("input",updateTotal);exKI.addEventListener("change",function(){patch(activeDay,{exKcal:this.value});updateTotal();});}
    var wkKI=document.getElementById("walkKcalIn");
    if(wkKI){wkKI.addEventListener("input",updateTotal);wkKI.addEventListener("change",function(){patch(activeDay,{walkKcal:this.value});updateTotal();});}
    var wmMove=document.getElementById("wmMove");
    if(wmMove)wmMove.addEventListener("change",function(){var wm=Object.assign({},dd(activeDay).watchMetrics||{});wm.move=this.value;patch(activeDay,{watchMetrics:wm});checkRingsComplete();});
    var wmExercise=document.getElementById("wmExercise");
    if(wmExercise)wmExercise.addEventListener("change",function(){var wm=Object.assign({},dd(activeDay).watchMetrics||{});wm.exercise=this.value;patch(activeDay,{watchMetrics:wm});checkRingsComplete();});
    var wmStand=document.getElementById("wmStand");
    if(wmStand)wmStand.addEventListener("change",function(){var wm=Object.assign({},dd(activeDay).watchMetrics||{});wm.stand=this.value;patch(activeDay,{watchMetrics:wm});checkRingsComplete();});
    var wIn=document.getElementById("wIn");
    if(wIn)wIn.addEventListener("change",function(){patch(activeDay,{weight:this.value,ts:Date.now()});});
    var nIn=document.getElementById("nIn");
    if(nIn)nIn.addEventListener("input",function(){patch(activeDay,{note:this.value});});
    var ringGoalsBtn=document.getElementById("ringGoalsEditBtn");
    if(ringGoalsBtn)ringGoalsBtn.addEventListener("click",function(e){e.stopPropagation();openRingGoalsSheet();});
  }
}

/* Workout overlay end button */
document.getElementById("woEndBtn").addEventListener("click",endWorkout);

/* Complete overlay continue */
document.getElementById("coContinueBtn").addEventListener("click",function(){
  document.getElementById("completeOverlay").classList.remove("active");
  render();
});

if(!Array.prototype.findIndex){Array.prototype.findIndex=function(fn){for(var i=0;i<this.length;i++)if(fn(this[i],i,this))return i;return -1;};}

function openAddShopItemSheet(){
  var h='<div class="sheet-title">+ Add Reward</div>'
    +'<div class="sheet-sub">CREATE A CUSTOM SHOP ITEM</div>'
    +'<label class="f-label">EMOJI</label><input class="f-input" id="siEmoji" placeholder="🎮" maxlength="2" value="🎁"/>'
    +'<label class="f-label">NAME</label><input class="f-input" id="siName" placeholder="e.g. Movie Night"/>'
    +'<label class="f-label">DESCRIPTION</label><input class="f-input" id="siDesc" placeholder="What is this reward?"/>'
    +'<label class="f-label">COST (XP)</label><input class="f-input" id="siCost" type="number" inputmode="numeric" placeholder="100" value="100"/>'
    +'<button class="sb prim" id="siAdd">ADD REWARD</button>'
    +'<button class="sb sec" id="siCancel">CANCEL</button>';
  openSheet(h);
  document.getElementById("siCancel").addEventListener("click",closeSheet);
  document.getElementById("siAdd").addEventListener("click",function(){
    var emoji=(document.getElementById("siEmoji").value||"🎁").trim();
    var name=(document.getElementById("siName").value||"").trim();
    var desc=(document.getElementById("siDesc").value||"").trim();
    var cost=parseInt(document.getElementById("siCost").value)||100;
    if(!name)return;
    var items=getShopItems();
    var id="custom_"+Date.now();
    items.push({id:id,emoji:emoji,name:name,desc:desc,cost:cost});
    var s=getStore();
    localStorage.setItem("gl3",JSON.stringify({d:data,g:gameData,shopItems:items}));
    closeSheet();render();
  });
}

function showDeleteConfirm(name, onYes, onNo){
  var bg=document.createElement("div");
  bg.className="del-confirm-bg";
  bg.innerHTML='<div class="del-confirm-box">'
    +'<div class="del-confirm-icon">🗑️</div>'
    +'<div class="del-confirm-title">Delete Reward?</div>'
    +'<div class="del-confirm-sub">"'+name+'" will be permanently removed.</div>'
    +'<div class="del-confirm-btns">'
    +'<button class="del-confirm-no" id="delNo">CANCEL</button>'
    +'<button class="del-confirm-yes" id="delYes">DELETE</button>'
    +'</div></div>';
  document.body.appendChild(bg);
  document.getElementById("delYes").addEventListener("click",function(){bg.remove();onYes();});
  document.getElementById("delNo").addEventListener("click",function(){bg.remove();if(onNo)onNo();});
}

function checkRingsComplete(){
  var d2=dd(activeDay);
  if(d2.ringsXpAwarded)return; // already awarded today
  var wm2=d2.watchMetrics||{};
  var goals2=getRingGoals(dk(activeDay));
  var mv=parseFloat(wm2.move)||0;
  var ex=parseFloat(wm2.exercise)||0;
  var st=parseFloat(wm2.stand)||0;
  if(mv>=goals2.move&&ex>=goals2.exercise&&st>=goals2.stand){
    patch(activeDay,{ringsXpAwarded:true});
    addXP(XP_RINGS_COMPLETE,"rings",window.innerWidth/2,200);
    showAchievement("🎯","RINGS CLOSED!","All 3 rings complete! +"+XP_RINGS_COMPLETE+" XP");
    render();
  }
}

function openRingGoalsSheet(){
  var dayKey=dk(activeDay);
  var goals=getRingGoals(dayKey);
  var h='<div class="sheet-title">🎯 Ring Goals</div>'
    +'<div class="sheet-sub">EDIT DAILY TARGETS</div>'
    +'<label class="f-label">🔴 MOVE (kcal)</label>'
    +'<input class="f-input" id="rgMove" type="number" inputmode="decimal" value="'+(goals.move||500)+'"/>'
    +'<label class="f-label">🟢 EXERCISE (min)</label>'
    +'<input class="f-input" id="rgExercise" type="number" inputmode="decimal" value="'+(goals.exercise||60)+'"/>'
    +'<label class="f-label">🔵 STAND (hrs)</label>'
    +'<input class="f-input" id="rgStand" type="number" inputmode="decimal" value="'+(goals.stand||8)+'"/>'
    +'<label class="f-label">APPLY TO</label>'
    +'<div class="scope"><button class="scope-opt on" id="rgScopeT">TODAY ONLY</button><button class="scope-opt" id="rgScopeP">PERMANENT</button></div>'
    +'<button class="sb prim" id="rgSave">SAVE GOALS</button>'
    +'<button class="sb sec" id="rgCancel">CANCEL</button>';
  openSheet(h);
  var scope="temp";
  document.getElementById("rgScopeT").addEventListener("click",function(){scope="temp";this.classList.add("on");document.getElementById("rgScopeP").classList.remove("on");});
  document.getElementById("rgScopeP").addEventListener("click",function(){scope="perm";this.classList.add("on");document.getElementById("rgScopeT").classList.remove("on");});
  document.getElementById("rgCancel").addEventListener("click",closeSheet);
  document.getElementById("rgSave").addEventListener("click",function(){
    var mv=parseFloat(document.getElementById("rgMove").value)||500;
    var ex=parseFloat(document.getElementById("rgExercise").value)||60;
    var st=parseFloat(document.getElementById("rgStand").value)||8;
    saveRingGoals({move:mv,exercise:ex,stand:st},scope,dayKey);
    closeSheet();render();
  });
}

render();
</script>
